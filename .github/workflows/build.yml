name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive

      - name: Get latest build info
        id: build-info
        run: |
          BUILD_INFO=$(eas build:list --limit 1 --json)
          BUILD_ID=$(echo "$BUILD_INFO" | jq -r '.[0].id')
          BUILD_URL=$(echo "$BUILD_INFO" | jq -r '.[0].artifacts.buildUrl')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Download APK
        run: |
          curl -L -o app.apk "${{ steps.build-info.outputs.build_url }}"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: app.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    runs-on: macos-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build iOS IPA
        run: eas build --platform ios --profile preview --non-interactive

      - name: Get latest build info
        id: build-info
        run: |
          BUILD_INFO=$(eas build:list --limit 1 --json)
          BUILD_ID=$(echo "$BUILD_INFO" | jq -r '.[0].id')
          BUILD_URL=$(echo "$BUILD_INFO" | jq -r '.[0].artifacts.buildUrl')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Download IPA
        run: |
          curl -L -o app.ipa "${{ steps.build-info.outputs.build_url }}"

      - name: Update Release with IPA
        uses: softprops/action-gh-release@v1
        with:
          files: app.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
