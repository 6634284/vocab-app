name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Login to EAS
        run: eas login --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        id: build-android
        run: |
          BUILD_URL=$(eas build --platform android --profile preview --non-interactive --json)
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Wait for build to complete
        run: |
          BUILD_ID=$(echo '${{ steps.build-android.outputs.build_url }}' | jq -r '.[0].id')
          while true; do
            STATUS=$(eas build:list --json | jq -r '.[0].status')
            if [ "$STATUS" = "finished" ]; then
              break
            elif [ "$STATUS" = "errored" ] || [ "$STATUS" = "canceled" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            echo "Build status: $STATUS, waiting..."
            sleep 60
          done

      - name: Download APK
        run: |
          BUILD_ID=$(echo '${{ steps.build-android.outputs.build_url }}' | jq -r '.[0].id')
          eas build:list --json | jq -r '.[0].artifacts.buildUrl' > apk_url.txt
          APK_URL=$(cat apk_url.txt)
          curl -L -o app.apk "$APK_URL"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: app.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Login to EAS
        run: eas login --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS IPA
        id: build-ios
        run: |
          BUILD_URL=$(eas build --platform ios --profile preview --non-interactive --json)
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Wait for build to complete
        run: |
          BUILD_ID=$(echo '${{ steps.build-ios.outputs.build_url }}' | jq -r '.[0].id')
          while true; do
            STATUS=$(eas build:list --json | jq -r '.[0].status')
            if [ "$STATUS" = "finished" ]; then
              break
            elif [ "$STATUS" = "errored" ] || [ "$STATUS" = "canceled" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            echo "Build status: $STATUS, waiting..."
            sleep 60
          done

      - name: Download IPA
        run: |
          BUILD_ID=$(echo '${{ steps.build-ios.outputs.build_url }}' | jq -r '.[0].id')
          eas build:list --json | jq -r '.[0].artifacts.buildUrl' > ipa_url.txt
          IPA_URL=$(cat ipa_url.txt)
          curl -L -o app.ipa "$IPA_URL"

      - name: Update Release with IPA
        uses: softprops/action-gh-release@v1
        with:
          files: app.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
