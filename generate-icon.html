<!DOCTYPE html>
<html>
<head>
  <title>Generate App Icon</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .icon-container { display: inline-block; margin: 20px; text-align: center; }
    .icon-container p { margin-top: 10px; color: #666; }
  </style>
</head>
<body>
  <h1>词达人 App Icon Generator</h1>
  <p>Right-click on the icons below to save them:</p>

  <div class="icon-container">
    <canvas id="icon1024" width="1024" height="1024"></canvas>
    <p>1024x1024 (App Store)</p>
  </div>

  <div class="icon-container">
    <canvas id="icon512" width="512" height="512"></canvas>
    <p>512x512</p>
  </div>

  <div class="icon-container">
    <canvas id="icon192" width="192" height="192"></canvas>
    <p>192x192 (Android)</p>
  </div>

  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      const scale = size / 1024;

      // 背景渐变
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#4A90D9');
      gradient.addColorStop(1, '#005ea1');

      // 圆角矩形背景
      const radius = size * 0.195;
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, radius);
      ctx.fillStyle = gradient;
      ctx.fill();

      // 书本
      ctx.save();
      ctx.translate(size/2, size * 0.43);

      // 左页
      ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
      ctx.beginPath();
      ctx.moveTo(-160*scale, -120*scale);
      ctx.lineTo(-160*scale, 160*scale);
      ctx.quadraticCurveTo(-160*scale, 180*scale, -140*scale, 180*scale);
      ctx.lineTo(0, 180*scale);
      ctx.lineTo(0, -120*scale);
      ctx.closePath();
      ctx.fill();

      // 右页
      ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
      ctx.beginPath();
      ctx.moveTo(0, -120*scale);
      ctx.lineTo(0, 180*scale);
      ctx.lineTo(140*scale, 180*scale);
      ctx.quadraticCurveTo(160*scale, 180*scale, 160*scale, 160*scale);
      ctx.lineTo(160*scale, -120*scale);
      ctx.closePath();
      ctx.fill();

      // 书脊
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      ctx.fillRect(-10*scale, -120*scale, 20*scale, 300*scale);

      // 字母 A
      ctx.fillStyle = '#005ea1';
      ctx.font = `bold ${96*scale}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('A', -45*scale, -20*scale);

      // 字母 B
      ctx.fillText('B', 75*scale, -20*scale);

      // 装饰线
      ctx.strokeStyle = '#4A90D9';
      ctx.lineWidth = 8*scale;
      ctx.lineCap = 'round';

      ctx.beginPath();
      ctx.moveTo(-110*scale, 40*scale);
      ctx.lineTo(-40*scale, 40*scale);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(50*scale, 40*scale);
      ctx.lineTo(120*scale, 40*scale);
      ctx.stroke();

      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.moveTo(-110*scale, 80*scale);
      ctx.lineTo(-60*scale, 80*scale);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(50*scale, 80*scale);
      ctx.lineTo(100*scale, 80*scale);
      ctx.stroke();

      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.moveTo(-110*scale, 120*scale);
      ctx.lineTo(-70*scale, 120*scale);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(50*scale, 120*scale);
      ctx.lineTo(90*scale, 120*scale);
      ctx.stroke();

      ctx.restore();

      // 星星装饰
      ctx.fillStyle = '#FFD700';
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.arc(200*scale, 240*scale, 16*scale, 0, Math.PI*2);
      ctx.fill();

      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.arc(824*scale, 240*scale, 12*scale, 0, Math.PI*2);
      ctx.fill();

      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(840*scale, 760*scale, 10*scale, 0, Math.PI*2);
      ctx.fill();

      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.arc(184*scale, 760*scale, 14*scale, 0, Math.PI*2);
      ctx.fill();

      // 文字
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${112*scale}px Arial`;
      ctx.textAlign = 'center';
      ctx.letterSpacing = `${16*scale}px`;
      ctx.fillText('词达人', size/2, size * 0.82);
    }

    drawIcon(document.getElementById('icon1024'), 1024);
    drawIcon(document.getElementById('icon512'), 512);
    drawIcon(document.getElementById('icon192'), 192);
  </script>
</body>
</html>
